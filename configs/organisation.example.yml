# =============================================================================
# MODÈLE de configuration pour VOTRE organisation
# -----------------------------------------------------------------------------
# Principe : adapter le portail = POINTER UNE CONFIG VERS UN CAS, sans jamais
# toucher au code applicatif (src/). Le circuit complet de la fabrique :
#
#   1. npm run interview -- --cas <slug>     # cadrer le besoin (15 étapes) →
#                                            #   cases/<slug>/harnais.yaml + configs/<slug>.yml
#   2. npm run scaffold -- --cas <slug>      # générer l'arborescence du cas
#   3. node scripts/import-source.mjs …      # amorcer chaque source, puis
#      npm run validate-corpus -- --cas <slug>   # la contrôler
#   4. CDH_CONFIG=<slug>.yml npm run dev     # servir VOTRE cas (port 3010)
#      CDH_CONFIG=<slug>.yml npm run build   # ou un rendu figé de production
#
# Ce fichier est le MODÈLE d'une config produite manuellement (variante du
# configs/<slug>.yml que l'interview génère pour vous). Pour l'utiliser tel quel :
#   a. cp configs/organisation.example.yml configs/organisation.yml
#   b. renseignez les valeurs ci-dessous (dont le champ `cas`)
#   c. dans .env : CDH_CONFIG=organisation.yml
#   d. remplacez les contenus de content/cases/<cas>/ par les vôtres
#   e. relancez : npm run dev
#
# Sans CDH_CONFIG, l'application sert le cas de démonstration par défaut
# (configs/demo.yml → cas « onboarding-agents »). La preuve de cette bascule
# est consignée dans docs/RECETTE.md (§ Lot 6).
#
# Rappels de cadre :
#   - n'indiquez que des FONCTIONS (jamais le nom d'une personne) ;
#   - un harnais du cadre ne traite que des données « publique » et « interne » ;
#   - la présence de données personnelles ou sensibles rend le cas inéligible
#     en l'état et impose un renvoi vers le DPO.
# =============================================================================

# Cas d'usage servi par cette configuration : dossier cases/<cas> (manifeste,
# gouvernance, tests) + content/cases/<cas> (corpus). Doit correspondre au slug
# choisi à l'étape « interview / scaffold » ci-dessus. Décommentez et adaptez
# pour servir un autre cas que le défaut « onboarding-agents ».
# cas: "mon-cas"

organisation:
  nom: "Nom de votre collectivité"
  type: "Type (commune, EPCI, syndicat mixte, centre de gestion…)"
  # Passez à false uniquement lorsque vous utilisez de vraies sources validées.
  fictive: true
  # Exemple secondaire (fictif) montrant une autre organisation possible :
  #   nom: "Communauté de communes de Roche-Vallonne"
  #   type: "Communauté de communes (fictive)"
  #   fictive: true
  # La démonstration livrée (configs/demo.yml) s'appuie, elle, sur le
  # « Syndicat mixte du Val de Brenne » (également fictif).

harnais:
  nom: "Portail d'accueil des nouveaux arrivants"
  # prototype tant que la fiche de validation n'est pas signée (cf. cycle de vie).
  statut: "prototype"
  besoin: >-
    Décrivez en une phrase, en langage métier, le besoin auquel ce portail
    répond, sans mentionner de situation individuelle.

gouvernance:
  responsable_metier: "Fonction responsable côté métier (ex. Direction RH)"
  dpo: "Fonction DPO (interne ou mutualisé)"
  dsi_rssi: "Fonction DSI / RSSI (interne ou mutualisée)"
  classification_donnees:
    - "publique"
    - "interne"

modele:
  nom_affiche: "recherche documentaire locale"

seuil_anciennete_mois: 24
