# =============================================================================
# MANIFESTE du harnais « onboarding-agents » — source de vérité du cas.
# -----------------------------------------------------------------------------
# Corpus dense (Lot 4) : 16 sources, organisation « Syndicat mixte du Val de
# Brenne » (fictive). Validé par src/lib/manifest.ts (schéma strict, zod).
# AUCUN secret ici : le mode IA oui, jamais une clé (architecture §3).
# =============================================================================
version: 1
slug: "onboarding-agents"
type: "documentaire"

# Besoin repris de configs/demo.yml (harnais.besoin).
besoin: >-
  Offrir aux nouveaux agents un point d'entrée documentaire clair, sourcé et à
  jour, pour éviter de répéter les mêmes explications à chaque arrivée, sans
  traiter aucune situation individuelle.

publics:
  - "nouveaux agents"
  - "encadrants"

# Modules affichés par l'application (navigation pilotée par le manifeste).
modules:
  parcours: true
  faq: true
  quiz: true
  checklist: true

# Sources déclarées (étape 4) — liste de contrôle pour l'import (étape 11).
# Alignées sur les frontmatters des 16 sources du corpus dense.
sources_declarees:
  - titre: "Règlement du temps de travail"
    proprietaire: "Direction des ressources humaines"
    date_connue: "2025-06-30"
  - titre: "Protection sociale complémentaire"
    proprietaire: "Direction des ressources humaines"
    date_connue: "2025-04-10"
  - titre: "Note de service — télétravail"
    proprietaire: "Direction des ressources humaines"
    date_connue: "2025-09-15"
  - titre: "Processus marchés publics — bons réflexes achat"
    proprietaire: "Direction de la commande publique"
    date_connue: "2025-05-20"
  - titre: "Contacts utiles par fonction"
    proprietaire: "Direction générale des services"
    date_connue: "2025-10-01"
  - titre: "Note d'accueil — vos premiers jours"
    proprietaire: "Direction des ressources humaines"
    date_connue: "2025-08-25"
  - titre: "Charte informatique"
    proprietaire: "Direction des systèmes d'information (mutualisée)"
    date_connue: "2025-03-12"
  - titre: "Charte achats responsables"
    proprietaire: "Direction de la commande publique"
    date_connue: "2025-02-18"
  - titre: "Procédure frais de déplacement"
