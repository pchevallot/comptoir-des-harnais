classification_autorisee:
  - "publique"
  - "interne"

# Refus qui s'ajoutent au socle non négociable (cas individuel, avis
# juridique/médical, affirmation sans source). Le cas ne déclare pas de refus
# complémentaire au-delà du socle : liste vide, honnête et traçable.
refus_complementaires: []

fournisseur:
  mode: "local"

etat:
  etape: 15
  statut: "prototype"
  mis_a_jour: "2026-07-19"
