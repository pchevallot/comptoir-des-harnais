# Parcours d'accueil du nouvel arrivant (contenu fictif de démonstration).
# Chaque étape renvoie vers une fiche pratique sourcée. Aucun ordre imposé,
# aucune progression enregistrée. Sept modules.
modules:
  - id: "premiers-jours"
    titre: "Vos premiers jours"
    objectif: "Savoir qui vous accueille, obtenir vos accès et vos repères pratiques."
    etapes:
      - titre: "L'accueil dans votre service"
        description: "Accès informatiques, badge, référent d'accueil, informations pratiques."
        fiche: "premiers-jours"
      - titre: "Les contacts utiles"
        description: "Identifier la bonne fonction selon votre question."
        fiche: "contacts"

  - id: "temps-de-travail"
    titre: "Votre temps de travail"
    objectif: "Comprendre la durée annuelle, les cycles et les congés."
    etapes:
      - titre: "Les repères du temps de travail"
        description: "1 607 heures, cycles de service, congés."
        fiche: "temps-de-travail"

  - id: "environnement-professionnel"
    titre: "Votre environnement de travail"
    objectif: "Repérer le télétravail et les réflexes achat."
    etapes:
      - titre: "Le télétravail"
        description: "Jours possibles, conditions, accord du responsable."
        fiche: "teletravail"
      - titre: "Les marchés publics"
        description: "Les bons réflexes avant d'acheter."
        fiche: "marches-publics"

  - id: "protection-sociale"
    titre: "Votre protection sociale"
    objectif: "Connaître le dispositif des mutuelles labellisées."
    etapes:
      - titre: "Les mutuelles labellisées"
        description: "Complémentaire santé et prévoyance, participation employeur."
        fiche: "mutuelles"

  - id: "numerique-securite"
    titre: "Numérique et sécurité"
    objectif: "Adopter les bons réflexes informatiques, de sécurité et d'usage de l'IA."
    etapes:
      - titre: "Informatique et sécurité"
        description: "Charte informatique, mots de passe, courriels suspects, cinq réflexes."
        fiche: "informatique-securite"
      - titre: "L'usage de l'IA interne"
        description: "Usages autorisés, usages interdits, validation humaine."
        fiche: "ia-interne"

  - id: "deplacements-frais"
    titre: "Déplacements et frais"
    objectif: "Savoir comment se déroule un déplacement de service et son remboursement."
    etapes:
      - titre: "Les frais de déplacement"
        description: "Ordre de mission, transport, repas, remboursement."
        fiche: "frais-deplacement"

  - id: "formation"
    titre: "Votre formation"
    objectif: "Comprendre le plan de formation et le circuit de demande."
    etapes:
      - titre: "La formation"
        description: "Orientations, typologie, campagne annuelle, formations obligatoires."
        fiche: "formation"
