# Quiz du nouvel arrivant (contenu fictif). Valide une lecture, jamais une
# personne. Aucun score n'est conservé ni transmis. Chaque question renvoie vers
# une fiche et une source.
questions:
  - id: "q-teletravail-jours"
    question: "Combien de jours de télétravail par semaine sont possibles au maximum ?"
    options:
      - "Un jour"
      - "Deux jours"
      - "Cinq jours"
    bonne_reponse: 1
    explication: "Le télétravail est plafonné à deux jours par semaine, avec au moins trois jours de présence sur site."
    renvoi_fiche: "teletravail"
    renvoi_source: "SRC-003"

  - id: "q-temps-annuel"
    question: "Quelle est la durée annuelle de travail de référence ?"
    options:
      - "1 400 heures"
      - "1 607 heures"
      - "1 800 heures"
    bonne_reponse: 1
    explication: "La durée annuelle de référence est de 1 607 heures."
    renvoi_fiche: "temps-de-travail"
    renvoi_source: "SRC-001"

  - id: "q-mutuelle-label"
    question: "Pour bénéficier de la participation santé, le contrat doit être…"
    options:
      - "N'importe quel contrat"
      - "Un contrat labellisé"
      - "Un contrat choisi par l'employeur"
    bonne_reponse: 1
    explication: "La participation santé s'applique aux contrats labellisés figurant sur la liste officielle."
    renvoi_fiche: "mutuelles"
    renvoi_source: "SRC-002"

  - id: "q-achat-reflexe"
    question: "Avant d'acheter, quel est le bon réflexe ?"
    options:
      - "Choisir tout de suite un fournisseur"
      - "Vérifier s'il existe déjà un marché couvrant le besoin"
      - "Attendre la fin de l'année"
    bonne_reponse: 1
    explication: "On vérifie d'abord s'il existe un marché, et on définit le besoin avant de consulter des entreprises."
    renvoi_fiche: "marches-publics"
    renvoi_source: "SRC-004"

  - id: "q-contacts-achat"
    question: "Pour une question d'achat, quelle fonction contacter ?"
    options:
      - "Le service de la commande publique"
      - "La médecine préventive"
      - "N'importe quel collègue"
    bonne_reponse: 0
    explication: "Les questions d'achat relèvent du service de la commande publique. Le portail oriente vers des fonctions, jamais des personnes."
    renvoi_fiche: "contacts"
    renvoi_source: "SRC-005"

  - id: "q-referent-accueil"
    question: "Qu'est-ce qu'un référent d'accueil ?"
    options:
      - "Une personne nommée dans l'annuaire"
      - "Une fonction qui accompagne le nouvel arrivant"
      - "Un logiciel de suivi"
    bonne_reponse: 1
    explication: "Le référent d'accueil est une fonction, pas une personne : le portail ne nomme jamais d'individu."
    renvoi_fiche: "premiers-jours"
    renvoi_source: "SRC-006"

  - id: "q-logiciel-installation"
    question: "Qui peut installer un logiciel sur votre poste ?"
    options:
      - "Chaque agent librement"
      - "La DSI uniquement"
      - "N'importe quel prestataire"
    bonne_reponse: 1
    explication: "L'installation des logiciels est réservée à la DSI ; on n'installe rien soi-même."
    renvoi_fiche: "informatique-securite"
    renvoi_source: "SRC-007"

  - id: "q-courriel-suspect"
    question: "Que faire face à un courriel suspect ?"
    options:
      - "Cliquer pour vérifier"
      - "Ne pas cliquer et le signaler"
      - "Le transférer à toute l'équipe"
    bonne_reponse: 1
    explication: "On ne clique pas et on signale. La DSI ne demande jamais un mot de passe par courriel."
    renvoi_fiche: "informatique-securite"
    renvoi_source: "SRC-007"

  - id: "q-securite-reflexe"
    question: "Parmi ces réflexes de sécurité, lequel est recommandé ?"
    options:
      - "Partager son mot de passe avec un collègue de confiance"
      - "Verrouiller sa session en quittant son poste"
      - "Brancher une clé USB trouvée pour l'identifier"
    bonne_reponse: 1
    explication: "Verrouiller sa session fait partie des cinq réflexes ; on ne partage pas son mot de passe et on ne branche rien d'inconnu."
    renvoi_fiche: "informatique-securite"
    renvoi_source: "SRC-012"

  - id: "q-classification"
    question: "Quels niveaux de classification le cadre traite-t-il ?"
    options:
      - "Publique et interne"
      - "Personnelle et sensible"
      - "Tous les niveaux sans distinction"
    bonne_reponse: 0
    explication: "Le cadre ne traite que les niveaux publique et interne ; les données personnelles ou sensibles rendent le cas inéligible."
    renvoi_fiche: "informatique-securite"
    renvoi_source: "SRC-012"

  - id: "q-frais-mission"
    question: "Avant un déplacement de service, que faut-il ?"
    options:
      - "Rien de particulier"
      - "Un ordre de mission préalable"
      - "Une note de frais signée après coup"
    bonne_reponse: 1
    explication: "Tout déplacement suppose un ordre de mission signé avant le départ."
    renvoi_fiche: "frais-deplacement"
    renvoi_source: "SRC-009"

  - id: "q-formation-obligatoire"
    question: "À l'arrivée, certaines formations sont…"
    options:
      - "Toujours facultatives"
      - "Obligatoires, notamment en sécurité"
      - "Réservées aux encadrants"
    bonne_reponse: 1
    explication: "Certaines formations sont obligatoires à l'arrivée, en particulier en matière de sécurité."
    renvoi_fiche: "formation"
    renvoi_source: "SRC-010"

  - id: "q-ia-interdit"
    question: "Que ne doit-on jamais faire avec une IA non validée ?"
    options:
      - "Reformuler un texte public"
      - "Y déposer des données personnelles ou internes"
      - "Chercher une définition générale"
    bonne_reponse: 1
    explication: "On ne dépose jamais de données personnelles ou internes dans un outil non validé, et l'IA ne décide pas à la place de l'humain."
    renvoi_fiche: "ia-interne"
    renvoi_source: "SRC-013"

  - id: "q-achats-responsables"
    question: "La charte des achats responsables privilégie…"
    options:
      - "Le prix le plus bas uniquement"
      - "La durabilité, le réemploi et les circuits de proximité"
      - "Un fournisseur choisi à l'avance"
    bonne_reponse: 1
    explication: "Les achats responsables privilégient durabilité, réemploi, proximité et insertion, dans le respect des principes de la commande publique."
    renvoi_fiche: "marches-publics"
    renvoi_source: "SRC-008"
